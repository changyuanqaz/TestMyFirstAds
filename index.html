<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>萌宠美食 - 健康宠物食品</title>

    <!-- 关键：让 Ads / Ideas 能识别 -->
    <meta name="description" content="健康天然宠物食品，为猫咪和狗狗提供优质营养，让宠物更健康快乐。">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f7;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
        .hero img {
            width: 100%;
            border-radius: 10px;
        }
        h1 {
            color: #333;
        }
        .products {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .product {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .product img {
            width: 100%;
            border-radius: 6px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: orange;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

<body>

<header>
    <h2>萌宠美食</h2>
</header>

<div class="container">

    <!-- Banner -->
    <div class="hero">

        我们精选天然食材，为猫咪和狗狗提供无添加、营养均衡的高品质宠物食品。
    </p>

    <!-- 产品展示 -->
    <div class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1601758123927-19679f404d19" alt="狗粮">
            <h3>优质狗粮</h3>
            <p>富含蛋白质，提升活力</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1598135753163-6167c1a1ad65" alt="猫粮">
            <h3>健康猫粮</h3>
            <p>专为猫咪设计的营养配方</p>
        </div>

    </div>

    <a class="btn" href="#">立即购买</a>

</div>

</html>
