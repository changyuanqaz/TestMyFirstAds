<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- ✅ 核心：帮助 Ads 理解你的网站 -->
    <title>Healthy Pet Food for Dogs and Cats</title>
    <meta name="description" content="Premium pet food for dogs and cats. Natural ingredients, balanced nutrition, and healthy meals for your pets.">
    <meta name="keywords" content="pet food, dog food, cat food, healthy pet food">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }
        img {
            width: 100%;
            border-radius: 8px;
        }
        .products {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .product {
            background: white;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    <h2>Pet Food Store</h2>
</header>

<div class="container">

    <!-- ✅ Banner图片（Ads肯定能抓） -->
    <img src="https://via.placeholder.com/800x300.png?text=Healthy+Pet+Food" alt="Pet Food Banner">

    <!-- ✅ 明确主题（Ads理解关键） -->
    <h1>Healthy Pet Food for Dogs and Cats</h1>
    <p>
        We provide premium pet food made with natural ingredients and balanced nutrition.
        Keep your pets happy and healthy every day.
    </p>

    <!-- ✅ 商品区域 -->
    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200.png?text=Dog+Food" alt="Dog Food">
            <h3>Natural Dog Food</h3>
            <p>High protein and healthy nutrition for dogs.</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200.png?text=Cat+Food" alt="Cat Food">
            <h3>Healthy Cat Food</h3>
            <p>Balanced meals designed for cats.</p>
        </div>

    </div>

</div>

</body>
</html>
